<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="IronLog"/>
<meta name="theme-color" content="#0c0c12"/>
<meta name="description" content="IronLog — Track. Lift. Grow."/>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; worker-src 'self' blob:; manifest-src 'self'"/>
<title>IronLog</title>

<!-- Apple touch icon -->
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='120' fill='%237C6EFA'/><text x='256' y='340' text-anchor='middle' font-size='280'>🏋️</text></svg>"/>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;padding:0;background:#0c0c12;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overscroll-behavior:none;}
#root{min-height:100vh;min-height:-webkit-fill-available;min-height:100dvh;}

/* ── Safe-area sizes as custom properties ── */
:root{
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
}

/* ── Top bar: sits at very top, pushes into safe area ── */
.il-topbar{
  position: fixed;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  z-index: 60;
  padding-top: env(safe-area-inset-top, 0px);
}

/* ── Scroll area: pushed below topbar ── */
.il-scroll{
  padding-top: calc(52px + env(safe-area-inset-top, 0px));
  padding-bottom: calc(68px + env(safe-area-inset-bottom, 0px));
  min-height: 100vh;
  min-height: -webkit-fill-available;
  min-height: 100dvh;
}

/* ── Bottom nav bar ── */
.il-nav{
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  z-index: 50;
  padding-top: 10px;
  padding-bottom: env(safe-area-inset-bottom, 10px);
}

/* Prevent iOS auto-zoom: all inputs must be >= 16px */
input, select, textarea { font-size: 16px; }

input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
input[type=number]{-moz-appearance:textfield;}
::-webkit-scrollbar{display:none;}
*{scrollbar-width:none;}
@keyframes pop{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
@keyframes flashFade{0%{opacity:0.35}100%{opacity:0}}
@keyframes slideInR{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInL{from{opacity:0;transform:translateX(-28px)}to{opacity:1;transform:translateX(0)}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.il-enter-r{animation:slideInR .2s cubic-bezier(.25,.46,.45,.94) both}
.il-enter-l{animation:slideInL .2s cubic-bezier(.25,.46,.45,.94) both}
.il-skel{background:linear-gradient(90deg,#1a1a28 25%,#26263a 50%,#1a1a28 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:12px}
@keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.il-fade-up{animation:fadeInUp .22s cubic-bezier(.25,.46,.45,.94) both}
button{transition:transform .1s cubic-bezier(.4,0,.2,1),opacity .1s;}
button:active{transform:scale(0.96)!important;opacity:0.85!important;}
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
